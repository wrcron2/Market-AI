services:
  # ─── Go Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${GO_SERVER_PORT:-8080}:8080"   # REST / HTTP + WebSocket (/ws)
      - "${GO_GRPC_PORT:-50051}:50051"   # gRPC (brain → backend)
    env_file: .env
    volumes:
      - ./infra/db:/app/db               # persist SQLite on host
    depends_on:
      - brain
    restart: unless-stopped

  # ─── Python AI Brain ─────────────────────────────────────────────────────────
  brain:
    build:
      context: ./ai-brain
      dockerfile: Dockerfile
    ports:
      - "${BRAIN_GRPC_PORT:-50052}:50052"
    env_file: .env
    # NOTE: Ollama must be running on the host at OLLAMA_HOST
    # Add `extra_hosts: ["host.docker.internal:host-gateway"]` if needed
    restart: unless-stopped

  # ─── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: marketflow-net
