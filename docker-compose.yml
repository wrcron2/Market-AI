services:
  # ─── Go Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: market-ai-backend:${APP_VERSION:-latest}
    ports:
      - "${GO_SERVER_PORT:-8080}:8080"   # REST / HTTP + WebSocket (/ws)
      - "${GO_GRPC_PORT:-50051}:50051"   # gRPC (brain → backend)
    env_file: .env
    volumes:
      - ./infra/db:/app/db               # persist SQLite on host
      - ./infra/versions:/app/versions   # version history + switch requests
    depends_on:
      - brain
    restart: unless-stopped

  # ─── Python AI Brain ─────────────────────────────────────────────────────────
  brain:
    build:
      context: ./ai-brain
      dockerfile: Dockerfile
    image: market-ai-brain:${APP_VERSION:-latest}
    ports:
      - "${BRAIN_GRPC_PORT:-50052}:50052"
    env_file: .env
    # NOTE: Ollama must be running on the host at OLLAMA_HOST
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: market-ai-frontend:${APP_VERSION:-latest}
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: marketflow-net
